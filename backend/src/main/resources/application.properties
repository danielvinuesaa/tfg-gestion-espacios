spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/tfg_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Configuración Horaria Global (Unificación a Europe/Madrid)
spring.jackson.time-zone=Europe/Madrid
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid

# Configuración Horaria de la Facultad
app.time.start-hour=9
app.time.end-hour=21
app.time.minute-step=30

# Configuración de Email (Local MailHog para desarrollo)
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Habilitar Tareas Programadas
spring.main.allow-bean-definition-overriding=true
